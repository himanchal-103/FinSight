services:
  db:
    image: postgres:16
    container_name: postgres_db
    # restart: always
    environment:
      POSTGRES_DB: finsight_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:8-alpine
    container_name: redis
    # restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  
  redis_insight:
    image: redis/redisinsight:latest
    container_name: redis_insight
    # restart: always
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/db

volumes:
  postgres_data:
  redis_data:
  redis_insight_data: